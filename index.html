<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>스페인어 단어 암기</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>🇪🇸 스페인어 단어 암기</h1>
      <div class="progress-wrap">
        <div class="progress-bar"><div id="progressFill"></div></div>
        <span id="progressText">0 / 0</span>
      </div>
      <div class="score-wrap">
        <span class="score correct">✓ <span id="correctCount">0</span></span>
        <span class="score wrong">✗ <span id="wrongCount">0</span></span>
      </div>
    </header>

    <div class="mode-tabs">
      <button class="tab active" data-mode="flashcard">플래시카드</button>
      <button class="tab" data-mode="quiz">퀴즈</button>
    </div>

    <main id="mainArea">
      <div id="loadingMsg" class="loading">단어를 불러오는 중...</div>

      <!-- Flashcard mode -->
      <div id="flashcardMode" class="mode-area hidden">
        <div class="card-container" id="cardContainer">
          <div class="card" id="card">
            <div class="card-front">
              <div class="label">한국어 뜻</div>
              <div class="word" id="koreanWord"></div>
            </div>
            <div class="card-back">
              <div class="label">스페인어</div>
              <div class="word" id="spanishWord"></div>
              <div class="alt-def" id="altDef"></div>
            </div>
          </div>
        </div>
        <p class="hint">카드를 클릭하면 정답이 보여요</p>
        <div class="nav-buttons">
          <button id="prevBtn" class="btn secondary">← 이전</button>
          <button id="knewItBtn" class="btn correct-btn">알았어요 ✓</button>
          <button id="didntKnowBtn" class="btn wrong-btn">몰랐어요 ✗</button>
          <button id="nextBtn" class="btn secondary">다음 →</button>
        </div>
      </div>

      <!-- Quiz mode -->
      <div id="quizMode" class="mode-area hidden">
        <div class="quiz-card">
          <div class="quiz-num" id="quizNum"></div>
          <div class="label">한국어 뜻</div>
          <div class="word" id="quizKorean"></div>
          <div class="input-wrap">
            <input type="text" id="quizInput" placeholder="스페인어 단어를 입력하세요" autocomplete="off" autocorrect="off" spellcheck="false" />
            <button id="checkBtn" class="btn primary">확인</button>
          </div>
          <div id="quizFeedback" class="feedback hidden"></div>
        </div>
      </div>

      <!-- Results screen -->
      <div id="resultsScreen" class="mode-area hidden">
        <div class="results-card">
          <div class="results-emoji" id="resultsEmoji"></div>
          <div class="results-score" id="resultsScore"></div>
          <div class="results-pct" id="resultsPct"></div>

          <div class="results-section correct-section">
            <h3>✓ 맞은 단어 <span id="correctList-count"></span></h3>
            <ul id="correctList"></ul>
          </div>

          <div class="results-section wrong-section">
            <h3>✗ 틀린 단어 <span id="wrongList-count"></span></h3>
            <ul id="wrongList"></ul>
          </div>

          <button id="retryBtn" class="btn primary retry-btn">다시 시험보기</button>
        </div>
      </div>
    </main>

    <div class="options-wrap">
      <label>
        <input type="checkbox" id="shuffleCheck" checked /> 섞기
      </label>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
